name: API Service CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "apis/**"
      - ".github/workflows/api-service.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "apis/**"
      - ".github/workflows/api-service.yml"

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r apis/requirements-dev.txt

      - name: Run tests
        working-directory: apis
        env:
          GEMINI_API_KEY: test_key_for_ci
          GEMINI_MODEL: gemini-2.0-flash
          MONGO_URI: mongodb://localhost:27017/test
          MONGO_DB_NAME: test
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME || 'kylec55' }}/api-service:latest -f apis/Dockerfile .

      - name: Push to Docker Hub
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME || 'kylec55' }}/api-service:latest

      - name: Deploy to DigitalOcean
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/apps/${{ secrets.DO_APP_ID }}/deployments"
