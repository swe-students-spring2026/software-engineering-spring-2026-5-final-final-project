name: API Service CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "apis/**"
      - ".github/workflows/api-service.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "apis/**"
      - ".github/workflows/api-service.yml"

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-service:latest ./apis

      - name: Smoke test
        run: |
          docker run --rm \
            -e MONGO_URI=mongodb://localhost:27017/test \
            -e MONGO_DB_NAME=test \
            -e API_INTERNAL_PORT=8000 \
            -e GEMINI_API_KEY=ci_dummy_key \
            ${{ secrets.DOCKER_USERNAME }}/api-service:latest \
            python -c "from app.main import app; print('smoke test passed')"

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        if: github.event_name == 'push'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/api-service:latest
