name: checkin-service CI

on:
  push:
    branches: [main, master]
    paths:
      - "checkin-service/**"
      - ".github/workflows/checkin-service.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "checkin-service/**"
      - ".github/workflows/checkin-service.yml"
  workflow_dispatch:

env:
  WORKDIR: checkin-service

jobs:
  test:
    name: Test with Coverage
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}

    env:
      MONGO_URI: mongodb://localhost:27017/
      DB_NAME: nyu_library_app_test
      PORT: 5001

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ env.WORKDIR }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage gate
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=80