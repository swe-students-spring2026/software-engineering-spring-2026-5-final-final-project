name: Database CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
    paths:
      - 'database/**'
      - 'tests/test_database_*.py'
      - 'tests/test_seed_data.py'
      - '.github/workflows/database.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'database/**'
      - 'tests/test_database_*.py'
      - 'tests/test_seed_data.py'
      - '.github/workflows/database.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pymongo==4.6.3 werkzeug==3.0.3 pytest pytest-cov
      - name: Run tests with coverage
        run: pytest tests/test_database_*.py tests/test_seed_data.py --cov=database --cov-report=term-missing --cov-fail-under=80

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./database
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/swe-project-5-db:${{ github.ref_name }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/swe-project-5-db:${{ github.sha }}
