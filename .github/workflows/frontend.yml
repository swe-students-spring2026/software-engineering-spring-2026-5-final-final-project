name: Frontend CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - "tests/frontend/**"
      - "tests/conftest.py"
      - "pyproject.toml"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "frontend/**"
      - "tests/frontend/**"
      - "tests/conftest.py"
      - "pyproject.toml"
      - ".github/workflows/frontend.yml"

env:
  LOCAL_IMAGE_NAME: cinematch-frontend

jobs:
  test:
    name: Test frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r frontend/requirements.txt
          python -m pip install pytest pytest-cov

      - name: Run frontend tests
        env:
          MONGO_URI: mongodb://localhost:27017/testdb
          SECRET_KEY: test-secret
          REC_API_URL: http://localhost:5001
        run: |
          python -m pytest tests/frontend --cov=frontend --cov-report=term-missing --cov-fail-under=80

  docker:
    name: Build and publish frontend image
    runs-on: ubuntu-latest
    needs: test
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: ${{ env.LOCAL_IMAGE_NAME }}:ci

      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && vars.DOCKERHUB_NAMESPACE != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Push image
        if: ${{ github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && vars.DOCKERHUB_NAMESPACE != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ vars.DOCKERHUB_NAMESPACE }}/cinematch-frontend:latest
            ${{ vars.DOCKERHUB_NAMESPACE }}/cinematch-frontend:${{ github.sha }}

  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: docker
    if: ${{ github.event_name == 'push' }}
    env:
      DO_HOST: ${{ secrets.DIGITALOCEAN_HOST }}
      DO_USERNAME: ${{ secrets.DIGITALOCEAN_USERNAME }}
      DO_SSH_KEY: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
    steps:
      - name: Deploy on DigitalOcean droplet
        if: ${{ env.DO_HOST != '' && env.DO_USERNAME != '' && env.DO_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DO_HOST }}
          username: ${{ env.DO_USERNAME }}
          key: ${{ env.DO_SSH_KEY }}
          script: |
            cd ~/cinematch
            docker compose pull frontend
            docker compose up -d frontend nginx
