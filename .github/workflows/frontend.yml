name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/frontend.yml"]
  pull_request:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/frontend.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest --cov=app --cov-fail-under=80

  build-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vibe-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/vibe-frontend:latest

  deploy:
    needs: build-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Digital Ocean
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vibe-frontend:latest
            docker stop vibe-frontend || true
            docker rm vibe-frontend || true
            docker run -d --name vibe-frontend --env-file /opt/vibe/.env \
              -e BACKEND_URL=http://vibe-backend:8000 \
              -p 3000:3000 ${{ secrets.DOCKERHUB_USERNAME }}/vibe-frontend:latest
