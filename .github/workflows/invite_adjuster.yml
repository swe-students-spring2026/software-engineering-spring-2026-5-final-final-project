name: invite_adjuster CI

on:
  push:
    branches: [main]
    paths:
      - "invite-adjuster/**"
      - ".github/workflows/invite_adjuster.yml"
  pull_request:
    branches: [main]
    paths:
      - "invite_adjuster/**"
      - ".github/workflows/invite_adjuster.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:4.4
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: invite_adjuster
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: pip install pipenv
      - run: pipenv install --dev pytest pytest-cov
      - run: MONGO_URI=mongodb://localhost:27017/ MONGO_DBNAME=flakemate pipenv run python app/app.py &
      - run: sleep 15
      - run: pipenv run pytest tests/
