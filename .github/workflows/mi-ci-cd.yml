name: CI/CD (Machine Learning)

on:
  push:
    branches: [main]
    paths:
      - "ml/**"
      - ".github/workflows/mi-ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "ml/**"
      - ".github/workflows/mi-ci-cd.yml"

jobs:
  test-machine-learning-client:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required directory exists
        run: |
          if [ ! -d ml ]; then
            echo "::error::Required directory 'ml' does not exist. Quitting."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        working-directory: ml
        run: |
          python -m pip install --upgrade pip
          python -m pip install pipenv pytest
          pipenv install --dev

      - name: Run tests if present
        working-directory: ml
        run: |
          if [ -d tests ] && find tests -type f | grep -q .; then
            pipenv run pytest tests
          else
            echo "No tests found in ml/tests."
          fi

      - name: Verify Dockerfile exists
        run: |
          if [ ! -f ml/Dockerfile ]; then
            echo "::error::Required Dockerfile 'ml/Dockerfile' does not exist. Quitting."
            exit 1
          fi

      - name: Build Docker image
        run: docker build -t project5-ml:${{ github.sha }} ml

      - name: Push Docker image to DockerHub
        if: github.event_name == 'push'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::DockerHub secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are required to push images."
            exit 1
          fi

          echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
          docker tag project5-ml:${{ github.sha }} "$DOCKERHUB_USERNAME/project5-ml:latest"
          docker tag project5-ml:${{ github.sha }} "$DOCKERHUB_USERNAME/project5-ml:${{ github.sha }}"
          docker push "$DOCKERHUB_USERNAME/project5-ml:latest"
          docker push "$DOCKERHUB_USERNAME/project5-ml:${{ github.sha }}"
