name: ml-app CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pipenv
          pipenv install --dev

      - name: Lint with pylint
        run: pipenv run pylint --disable=import-error ml-app/*.py

      - name: Check formatting with black
        run: pipenv run black --check --diff ml-app/

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pipenv
          pipenv install --dev

      - name: Create app package symlink
        run: ln -s ml-app app

      - name: Run tests with coverage
        run: pipenv run pytest tests/test_api.py --cov=app --cov-report=term-missing --cov-fail-under=80

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ml-app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ml-app/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ml-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ml-app:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - name: Deploy to Digital Ocean droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ml-app:latest
            docker compose -f /app/docker-compose.yml up -d --no-deps ml-app
