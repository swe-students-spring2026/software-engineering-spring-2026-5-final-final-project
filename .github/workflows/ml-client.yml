name: ml-service CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - "ML-client/**"
      - ".github/workflows/ml-client.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "ML-client/**"
      - ".github/workflows/ml-client.yml"

jobs:
  # Test 
  test:
    name: Run tests & check coverage
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ML-client/requirements.txt

      - name: Install dependencies
        working-directory: ML-client
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: ML-client
        env:
          # Dummy values for CI environment
          MONGO_URI: "mongodb://localhost:27017"
          GEMINI_API_KEY: "fake-key"
          SPOTIFY_CLIENT_ID: "fake-id"
          SPOTIFY_CLIENT_SECRET: "fake-secret"
          OPENWEATHER_API_KEY: "fake-key"
          PYTHONPATH: "app"
        run: |
          python -m pytest app/ --cov=app --cov-report=term-missing --cov-fail-under=80
  # Build and push Docker image
  build-and-push:
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ML-Client
        uses: docker/build-push-action@v4
        with:
          context: ./ML-client             
          push: true
          tags: hy2484/moodify-ml:latest   
