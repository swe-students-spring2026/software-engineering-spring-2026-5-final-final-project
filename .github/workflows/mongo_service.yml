on:
  push:
    branches: [main, master]
    paths:
      - "mongo_service/**"
  pull_request:
    branches: [main, master]
    paths:
      - "mongo_service/**"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    services:
      mongodb:
        image: mongo:latest
        options: >-
          --health-cmd mongosh --eval "db.adminCommand({ ping: 1 })"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r mongo_service/requirements.txt
          pip install pytest mongomock pytest-cov

      - name: Run tests with coverage
        env:
          MONGO_URI: mongodb://admin:password@localhost:27017/stocks_db?authSource=admin
          PYTHONPATH: .
        run: |
          pytest --cov=mongo_service --cov-fail-under=80 -q

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/swe-mongo-service:latest
