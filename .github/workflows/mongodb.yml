name: MongoDB Subsystem CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - "mongodb/**"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "mongodb/**"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r mongodb/requirements.txt

      - name: Run tests with coverage
        env:
          MONGO_URI: mongodb://fake-atlas-host/rove_beetle
        run: |
          cd mongodb
          PYTHONPATH=. pytest tests/test_db.py --cov=db --cov=api --cov-report=term-missing --cov-fail-under=80

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./mongodb
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rove-beetle-mongodb:latest

  deploy:
    name: Deploy to Digital Ocean
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
      - name: Deploy to Digital Ocean Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_MONGODB_HOST }}
          username: ${{ secrets.DO_MONGODB_USER }}
          key: ${{ secrets.DO_MONGODB_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/rove-beetle-mongodb:latest
            docker stop rove-beetle-mongodb || true
            docker rm rove-beetle-mongodb || true
            docker run -d \
              --name rove-beetle-mongodb \
              --restart always \
              -p 8001:8001 \
              -e MONGO_URI=${{ secrets.MONGO_URI }} \
              ${{ secrets.DOCKER_USERNAME }}/rove-beetle-mongodb:latest