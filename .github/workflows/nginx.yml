name: Nginx CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - "nginx/**"
      - "docker-compose.yml"
      - ".github/workflows/nginx.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "nginx/**"
      - "docker-compose.yml"
      - ".github/workflows/nginx.yml"

env:
  LOCAL_IMAGE_NAME: cinematch-nginx

jobs:
  validate:
    name: Validate nginx config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check nginx configuration
        run: |
          docker run --rm \
            --add-host recommendation-engine:127.0.0.1 \
            --add-host frontend:127.0.0.1 \
            -v "$PWD/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            --entrypoint nginx \
            nginx:alpine -t

  docker:
    name: Build and publish nginx image
    runs-on: ubuntu-latest
    needs: validate
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: false
          tags: ${{ env.LOCAL_IMAGE_NAME }}:ci

      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && vars.DOCKERHUB_NAMESPACE != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Push image
        if: ${{ github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && vars.DOCKERHUB_NAMESPACE != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ vars.DOCKERHUB_NAMESPACE }}/cinematch-nginx:latest
            ${{ vars.DOCKERHUB_NAMESPACE }}/cinematch-nginx:${{ github.sha }}

  deploy:
    name: Deploy nginx
    runs-on: ubuntu-latest
    needs: docker
    if: ${{ github.event_name == 'push' }}
    env:
      DO_HOST: ${{ secrets.DIGITALOCEAN_HOST }}
      DO_USERNAME: ${{ secrets.DIGITALOCEAN_USERNAME }}
      DO_SSH_KEY: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
    steps:
      - name: Deploy on DigitalOcean droplet
        if: ${{ env.DO_HOST != '' && env.DO_USERNAME != '' && env.DO_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DO_HOST }}
          username: ${{ env.DO_USERNAME }}
          key: ${{ env.DO_SSH_KEY }}
          script: |
            cd ~/cinematch
            docker compose pull nginx
            docker compose up -d nginx
