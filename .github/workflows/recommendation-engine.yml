name: Recommendation Engine CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - "recommendation-engine/**"
      - "tests/recommendation_engine/**"
      - "tests/conftest.py"
      - "pyproject.toml"
      - ".github/workflows/recommendation-engine.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "recommendation-engine/**"
      - "tests/recommendation_engine/**"
      - "tests/conftest.py"
      - "pyproject.toml"
      - ".github/workflows/recommendation-engine.yml"

env:
  LOCAL_IMAGE_NAME: cinematch-recommendation-engine

jobs:
  test:
    name: Test recommendation engine
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r recommendation-engine/requirements.txt
          python -m pip install pytest pytest-cov

      - name: Run recommendation-engine tests
        run: |
          python -m pytest tests/recommendation_engine --cov=embeddings --cov=recommender --cov-report=term-missing --cov-fail-under=80

  docker:
    name: Build and publish recommendation-engine image
    runs-on: ubuntu-latest
    needs: test
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./recommendation-engine
          push: false
          tags: ${{ env.LOCAL_IMAGE_NAME }}:ci

      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && vars.DOCKERHUB_NAMESPACE != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Push image
        if: ${{ github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && vars.DOCKERHUB_NAMESPACE != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./recommendation-engine
          push: true
          tags: |
            ${{ vars.DOCKERHUB_NAMESPACE }}/cinematch-recommendation-engine:latest
            ${{ vars.DOCKERHUB_NAMESPACE }}/cinematch-recommendation-engine:${{ github.sha }}

  deploy:
    name: Deploy recommendation engine
    runs-on: ubuntu-latest
    needs: docker
    if: ${{ github.event_name == 'push' }}
    env:
      DO_HOST: ${{ secrets.DIGITALOCEAN_HOST }}
      DO_USERNAME: ${{ secrets.DIGITALOCEAN_USERNAME }}
      DO_SSH_KEY: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
    steps:
      - name: Deploy on DigitalOcean droplet
        if: ${{ env.DO_HOST != '' && env.DO_USERNAME != '' && env.DO_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DO_HOST }}
          username: ${{ env.DO_USERNAME }}
          key: ${{ env.DO_SSH_KEY }}
          script: |
            cd ~/cinematch
            docker compose pull recommendation-engine
            docker compose up -d recommendation-engine nginx
