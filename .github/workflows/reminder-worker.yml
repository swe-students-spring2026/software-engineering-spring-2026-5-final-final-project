on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reminder_worker
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pipenv install --dev

      - name: Lint with pylint
        run: |
          pipenv run pylint reminder_service.py email_service.py db.py worker.py --fail-under=5

      - name: Test with pytest
        run: |
          PYTHONPATH=. pipenv run pytest tests/ --cov=. --cov-report=term-missing