name: Scraper CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "scrapers/**"
      - ".github/workflows/scraper.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "scrapers/**"
      - ".github/workflows/scraper.yml"

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME || 'kylec55' }}/scraper:latest ./scrapers

      - name: Smoke test
        run: |
          docker run --rm \
            ${{ secrets.DOCKER_USERNAME || 'kylec55' }}/scraper:latest \
            python scraper.py --list-schools

      - name: Push to Docker Hub
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME || 'kylec55' }}/scraper:latest
