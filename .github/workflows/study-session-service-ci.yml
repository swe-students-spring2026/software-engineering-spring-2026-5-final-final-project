name: CI (study session service)

on:
  push:
    branches: [main, master]
    paths:
      - "study-session-service/**"
      - ".github/workflows/study-session-service-ci.yml"
      - "pyproject.toml"
  pull_request:
    branches: [main, master]
    paths:
      - "study-session-service/**"
      - ".github/workflows/study-session-service-ci.yml"
      - "pyproject.toml"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: study-session-service

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: study-session-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest --cov=app --cov=detector --cov-report=term-missing --cov-fail-under=80
