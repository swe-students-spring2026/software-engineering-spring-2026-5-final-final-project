name: Run tests

on:
  pull_request:
    branches: [main]

jobs:
  test-game-engine:
    name: Game engine tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: game-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: game-engine/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest

  test-web-app:
    name: Web app tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r ../requirements.txt
      - name: Run pytest
        run: pytest
