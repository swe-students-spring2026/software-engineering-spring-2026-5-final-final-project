name: Web App CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-web-app:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    defaults:
      run:
        working-directory: web-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key
          MONGODB_URI: mongodb://localhost:27017/priority_manager_test
          MONGO_URI: mongodb://localhost:27017/priority_manager_test
          ML_CLIENT_URL: http://localhost:5001
        run: |
          python -m pytest -v

      - name: Build Docker image
        run: |
          docker build -t priority-manager-web-app .
