name: web-app CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install pipenv and dependencies
        run: |
          pip install --user pipenv
          cd web-app
          pipenv install --dev

      - name: Run tests
        run: |
          cd web-app
          pipenv run pytest --cov=. --cov-report=term-missing --cov-fail-under=80
