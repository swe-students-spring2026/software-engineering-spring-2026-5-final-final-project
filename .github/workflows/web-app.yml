name: Frontend CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/web-app.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/web-app.yml"

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r frontend/requirements.txt

      - name: Run tests
        working-directory: frontend
        env:
          API_URL: http://test-backend:8000
          FRONTEND_INTERNAL_PORT: "3000"
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME || 'kylec55' }}/web-app:latest ./frontend

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        if: github.event_name == 'push'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME || 'kylec55' }}/web-app:latest
