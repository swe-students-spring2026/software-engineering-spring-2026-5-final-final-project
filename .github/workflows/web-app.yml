name: web-app CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --user pipenv
          cd web-app
          pipenv install --dev

      - name: Lint with pylint
        run: |
          cd web-app
          pipenv run pylint **/*.py

      - name: Check formatting with black
        run: |
          cd web-app
          pipenv run black --check --diff .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --user pipenv
          cd web-app
          pipenv install --dev

      - name: Run tests with coverage
        run: |
          cd web-app
          pipenv run pytest --cov=. --cov-report=term-missing --cov-fail-under=80

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web-app image
        uses: docker/build-push-action@v5
        with:
          context: ./web-app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vibelist:web-app
            ${{ secrets.DOCKERHUB_USERNAME }}/vibelist:web-app-${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - name: Deploy to Digital Ocean droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vibelist:web-app
            docker compose -f /app/docker-compose.yml up -d --no-deps web
