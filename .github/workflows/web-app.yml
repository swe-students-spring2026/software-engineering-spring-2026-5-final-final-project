name: web-app CI/CD
 
on:
  push:
    branches: [main, master]
    paths:
      - "web-app/**"
      - ".github/workflows/web-app.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "web-app/**"
      - ".github/workflows/web-app.yml"
 
jobs:
  # Test 
  test:
    name: Run tests & check coverage
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
          
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: web-app/requirements.txt
 
      - name: Install dependencies
        working-directory: web-app
        run: pip install -r requirements.txt
 
      - name: Run tests with coverage
        working-directory: web-app
        env:
          # Dummy values so app doesn't crash on import
          SECRET_KEY: "test-secret-key"
          MONGO_URI: "mongodb://localhost:27017"
          MONGO_DB_NAME: "moodify_test"
          SPOTIFY_CLIENT_ID: "fake-client-id"
          SPOTIFY_CLIENT_SECRET: "fake-client-secret"
          SPOTIFY_REDIRECT_URI: "http://127.0.0.1:5000/callback"
          ML_CLIENT_URL: "http://localhost:8000"
          WEATHER_API_KEY: "fake-weather-key"
        run: |
          python -m pytest tests/ --cov=. --cov-report=term-missing --cov-fail-under=80
  # Build and push Docker image
  build-and-push:
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Web-App
        uses: docker/build-push-action@v4
        with:
          context: ./web-app
          push: true
          tags: hy2484/moodify-web:latest  