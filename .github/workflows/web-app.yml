name: Web App CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - "web-app/**"
      - ".github/workflows/web-app.yml"

  pull_request:
    branches:
      - main
      - master
    paths:
      - "web-app/**"
      - ".github/workflows/web-app.yml"

jobs:
  test-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          PYTHONPATH=. pytest --cov=. --cov-report=term-missing --cov-fail-under=80

      - name: Build Docker image
        run: |
          docker build -t web-app-test .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        run: |
          docker tag web-app-test ${{ secrets.DOCKERHUB_USERNAME }}/lacewing_squad_web_app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/lacewing_squad_web_app:latest

      - name: Deploy to Digital Ocean
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /root/5-final-lacewing_squad
            git pull
            docker compose down --remove-orphans
            docker compose up --build --force-recreate -d
