name: web_app CI

on:
  push:
    branches: [main]
    paths:
      - "web_app/**"
      - ".github/workflows/web_app.yml"
  pull_request:
    branches: [main]
    paths:
      - "web_app/**"
      - ".github/workflows/web_app.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:4.4
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: web_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: pip install pipenv
      - run: pipenv install --dev pytest pytest-cov
      - run: MONGO_URI=mongodb://localhost:27017/ MONGO_DBNAME=flakemate pipenv run pytest test