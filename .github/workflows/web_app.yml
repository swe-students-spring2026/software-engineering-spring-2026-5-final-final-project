name: web_app CI

on:
  push:
    branches: [main]
    paths:
      - 'web-app/**'
      - '.github/workflows/web-app.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web-app/**'
      - '.github/workflows/web-app.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install pipenv
      - run: pipenv install --dev
      - run: pipenv run pytest