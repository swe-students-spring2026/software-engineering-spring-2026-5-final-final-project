version: "3.9"

services:
  ml-service:
    build: .
    container_name: ml-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/moodmusic
    depends_on:
      - mongo
    volumes:
      - ./app:/app
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: ml-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
