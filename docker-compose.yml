services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  web:
    build: ./web_app
    image: csl9997/reminder-web:latest
    ports:
      - "8000:8000"
    env_file: 
      - ./web_app/.env
    depends_on:
      - mongodb

  worker:
    build: ./reminder_worker
    image: csl9997/reminder-worker:latest
    env_file:
      - ./reminder_worker/.env
    depends_on:
      - mongodb

volumes:
  mongo_data: