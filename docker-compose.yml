services:
  web-app:
    image: chasecvitale/web-app:latest
    ports:
      - "5002:5000"
    depends_on:
      - mongodb
      - invite-adjuster
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DBNAME=flakemate

  invite-adjuster:
    image: chasecvitale/invite-adjuster:latest
    ports:
      - "5001:5000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DBNAME=flakemate

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: