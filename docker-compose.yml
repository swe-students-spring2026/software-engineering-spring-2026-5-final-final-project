version: "3.9"

services:
  ml-service:
    image: hy2484/moodify-ml:latest
    container_name: ml-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/app
    depends_on:
      - mongo
    restart: unless-stopped

  web-app:
    image: hy2484/moodify-web:latest
    container_name: web-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - ML_SERVICE_URL=http://ml-service:8000
      - MONGO_DB_NAME=moodmusic
    depends_on:
      - ml-service
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: ml-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: