services:
  mongo:
    image: mongo:${MONGO_IMAGE_TAG:-7}
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  apis:
    build:
      context: .
      dockerfile: apis/Dockerfile
      args:
        PYTHON_IMAGE_TAG: ${PYTHON_IMAGE_TAG}
        API_INTERNAL_PORT: ${API_INTERNAL_PORT}
    container_name: ${API_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB_NAME: ${MONGO_DB_NAME}
      API_INTERNAL_PORT: ${API_INTERNAL_PORT}
      API_INTERNAL_TOKEN: ${API_INTERNAL_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_MODEL_FAST: ${GEMINI_MODEL_FAST:-}
      GEMINI_MODEL_BALANCED: ${GEMINI_MODEL_BALANCED:-}
      GEMINI_MODEL_SMART: ${GEMINI_MODEL_SMART:-}
    ports:
      - "${API_PORT}:${API_INTERNAL_PORT}"
    depends_on:
      mongo:
        condition: service_healthy

  scrapers:
    build:
      context: ./scrapers
      args:
        PYTHON_IMAGE_TAG: ${PYTHON_IMAGE_TAG}
    container_name: crawlers
    command: ["python", "run_daily_scrape.py"]
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB_NAME: ${MONGO_DB_NAME}
      SCRAPER_TERMS: ${SCRAPER_TERMS}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS}
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        PYTHON_IMAGE_TAG: ${PYTHON_IMAGE_TAG}
        FRONTEND_INTERNAL_PORT: ${FRONTEND_INTERNAL_PORT}
    container_name: ${FRONTEND_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      FRONTEND_INTERNAL_PORT: ${FRONTEND_INTERNAL_PORT}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL}
      API_URL: http://backend:8000
      API_INTERNAL_TOKEN: ${API_INTERNAL_TOKEN:-}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_INTERNAL_PORT}"
    depends_on:
      - apis

volumes:
  mongo_data:
