# MongoDB subsystem: MongoDB Atlas (connection string via MONGO_URI in .env)
# Subsystems: web (Flask), ml-app (FastAPI), MongoDB Atlas

services:
  web:
    build: ./web-app
    ports:
      - "5050:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - ML_APP_URL=http://ml-app:8000
    volumes:
      - ./web-app/app.py:/app/app.py
      - ./web-app/templates:/app/templates
      - ./web-app/static:/app/static
    networks:
      - app-network

  ml-app:
    build:
      context: .
      dockerfile: ml-app/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI}
    networks:
      - app-network

networks:
  app-network:
