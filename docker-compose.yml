services:
  # persistent database
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
        build:
          context: ./mongo_service/db
        ports:
          - "27017:27017"
        environment:
          - MONGO_INITDB_DATABASE=stocks_app
          - PIPELINE_OUTPUT_DIR=/seed/pipeline
        volumes:
          - mongo_data:/data/db
          - ./pipeline/output:/seed/pipeline:ro
    build: ./web
          - ./pipeline/output:/seed/pipeline:ro
    ports:
      - "5000:5000"
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
    depends_on:
      - mongodb

  # opt-in service, run with --profile pipeline
  pipeline:
    build: ./pipeline
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
    depends_on:
      - mongodb
    profiles:
      - pipeline

volumes:
  mongo_data:
