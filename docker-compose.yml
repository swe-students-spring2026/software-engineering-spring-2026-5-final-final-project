version: "3.9"

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/vibe
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  mongo_data:
