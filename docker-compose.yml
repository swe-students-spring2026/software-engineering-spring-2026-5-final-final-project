services:
  apis:
    build:
      context: .
      dockerfile: apis/Dockerfile
      args:
        PYTHON_IMAGE_TAG: ${PYTHON_IMAGE_TAG}
        API_INTERNAL_PORT: ${API_INTERNAL_PORT}
    container_name: ${API_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB_NAME: ${MONGO_DB_NAME}
      API_INTERNAL_PORT: ${API_INTERNAL_PORT}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
    ports:
      - "${API_PORT}:${API_INTERNAL_PORT}"

  scrapers:
    build:
      context: ./scrapers
      args:
        PYTHON_IMAGE_TAG: ${PYTHON_IMAGE_TAG}
    container_name: crawlers
    command: ["python", "run_daily_scrape.py"]
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB_NAME: ${MONGO_DB_NAME}
      SCRAPER_TERMS: ${SCRAPER_TERMS}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        PYTHON_IMAGE_TAG: ${PYTHON_IMAGE_TAG}
        FRONTEND_INTERNAL_PORT: ${FRONTEND_INTERNAL_PORT}
    container_name: ${FRONTEND_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      FRONTEND_INTERNAL_PORT: ${FRONTEND_INTERNAL_PORT}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL}
      API_URL: http://backend:8000
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_INTERNAL_PORT}"
    depends_on:
      - apis
