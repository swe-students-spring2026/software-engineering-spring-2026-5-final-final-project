version: "3.9"

services:
  ml-service:
    build: ./ML-client
    container_name: ml-service
    ports:
      - "8000:8000"
    env_file:
      - ./ML-client/.env
    environment:
      - PYTHONPATH=/app/app
      - MONGO_URI=mongodb://mongo:27017/moodmusic
    depends_on:
      - mongo
    volumes:
      - ./ML-client:/app
    restart: unless-stopped

  web-app:
    build: ./web-app
    container_name: web-app
    ports:
      - "5000:5000"
    env_file:
      - ./web-app/.env
    environment:
      - ML_SERVICE_URL=http://ml-service:8000
      - MONGO_URI=mongodb://mongo:27017/moodmusic
    depends_on:
      - ml-service
      - mongo
    volumes:
      - ./web-app:/app
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: ml-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: