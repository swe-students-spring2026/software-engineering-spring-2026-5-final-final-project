services:
  mongodb:
    image: mongo:${MONGO_IMAGE_TAG}
    container_name: ${MONGO_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    ports:
      - "${MONGO_PORT}:${MONGO_INTERNAL_PORT}"
    volumes:
      - mongodb_data:/data/db

  apis:
    build:
      context: ./apis
      args:
        PYTHON_IMAGE_TAG: ${PYTHON_IMAGE_TAG}
        API_INTERNAL_PORT: ${API_INTERNAL_PORT}
    container_name: ${API_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@${MONGO_HOST}:${MONGO_INTERNAL_PORT}/${MONGO_DB_NAME}?authSource=${MONGO_AUTH_SOURCE}
      MONGO_DB_NAME: ${MONGO_DB_NAME}
      API_INTERNAL_PORT: ${API_INTERNAL_PORT}
    ports:
      - "${API_PORT}:${API_INTERNAL_PORT}"
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      args:
        PYTHON_IMAGE_TAG: ${PYTHON_IMAGE_TAG}
        FRONTEND_INTERNAL_PORT: ${FRONTEND_INTERNAL_PORT}
    container_name: ${FRONTEND_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      FRONTEND_INTERNAL_PORT: ${FRONTEND_INTERNAL_PORT}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_INTERNAL_PORT}"
    depends_on:
      - apis

volumes:
  mongodb_data:
