services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 5

  db-init:
    build: ./database
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"

  api:
    build: ./api
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
    depends_on:
      db-init:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    ports:
      - "8000:3000"
    env_file: .env
    environment:
      - API_URL=http://api:5001
    depends_on:
      - api

volumes:
  mongo_data:
