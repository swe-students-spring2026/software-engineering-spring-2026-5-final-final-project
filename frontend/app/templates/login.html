{% extends "base.html" %}
{% block title %}vibe — sign in{% endblock %}
{% block body %}
<div class="page page--auth">
  <div class="auth-logo"><span class="logo">vibe</span></div>
  <p class="auth-tagline">music knows who you are.</p>

  <div class="auth-card">
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('main.login') }}">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Sign in</button>
    </form>
  </div>

  <p class="auth-footer">
    No account? <a href="{{ url_for('main.register') }}">Create one</a>
  </p>
</div>
{% endblock %}
