<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — NYU Course Planner</title>
  <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="logo">NYU <span>Course Planner</span></div>
      <p>Plan your semester with AI-powered scheduling</p>
    </div>

    <div class="tabs">
      <button class="tab-btn {% if tab == 'register' %}{% else %}active{% endif %}" onclick="switchTab('login', this)">Sign In</button>
      <button class="tab-btn {% if tab == 'register' %}active{% endif %}" onclick="switchTab('register', this)">Create Account</button>
    </div>

    <div class="card-body">
      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}

      <!-- Sign In -->
      <div class="tab-panel {% if tab == 'register' %}{% else %}active{% endif %}" id="panel-login">
        <form method="POST" action="/login">
          <div class="form-group">
            <label for="login-email">NYU Email</label>
            <input id="login-email" name="email" type="email" placeholder="netid@nyu.edu" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input id="login-password" name="password" type="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <div class="divider">or</div>

        <a href="/auth/google" class="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
          </svg>
          Continue with Google
        </a>
      </div>

      <!-- Create Account -->
      <div class="tab-panel {% if tab == 'register' %}active{% endif %}" id="panel-register">
        <form method="POST" action="/register">
          <div class="form-group">
            <label for="reg-name">Full Name</label>
            <input id="reg-name" name="name" type="text" placeholder="First Last" autocomplete="name">
          </div>
          <div class="form-group">
            <label for="reg-email">NYU Email</label>
            <input id="reg-email" name="email" type="email" placeholder="netid@nyu.edu" required autocomplete="email">
            <div class="hint">Must be an @nyu.edu address</div>
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input id="reg-password" name="password" type="password" placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8">
          </div>
          <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <div class="divider">or</div>

        <a href="/auth/google" class="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
          </svg>
          Continue with Google
        </a>
      </div>

      <div class="nyu-note">Access restricted to <strong>@nyu.edu</strong> accounts only</div>
    </div>
  </div>

  <script src="/static/js/login.js"></script>
</body>
</html>
