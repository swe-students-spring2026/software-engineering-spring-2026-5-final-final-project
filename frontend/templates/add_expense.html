{% extends "base.html" %}
{% block title %}Add Expense{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Add Expense</h1>
</div>

<section class="form-section">
    {% if error %}
    <p class="form-error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/add">
        <div class="form-group">
            <label class="form-label">Friend</label>
            <select class="form-input" name="debtor_username">
                {% for f in friendships %}
                <option value="{{ f.friend_username }}">{{ f.friend_username }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Description</label>
            <input type="text" class="form-input" name="description" placeholder="e.g. Dinner" />
        </div>

        <div class="form-group">
            <label class="form-label">Total Amount ($)</label>
            <input type="number" step="0.01" class="form-input" name="total_amount" placeholder="0.00" />
        </div>

        <div class="form-group">
            <label class="form-label">Amount They Owe ($)</label>
            <input type="number" step="0.01" class="form-input" name="amount_owed" placeholder="0.00" />
        </div>

        <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-input" name="category">
                <option value="general">General</option>
                <option value="food">Food</option>
                <option value="transport">Transport</option>
                <option value="rent">Rent</option>
                <option value="utilities">Utilities</option>
            </select>
        </div>

        <button type="submit" class="btn-primary">Add Expense</button>
    </form>
</section>
{% endblock %}
