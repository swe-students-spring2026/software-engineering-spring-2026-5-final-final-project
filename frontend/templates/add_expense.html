{% extends "base.html" %}
{% block title %}Add Expense{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Add Expense</h1>
</div>

<form class="expense-form">
    <div class="form-group">
        <label class="form-label">Description</label>
        <input class="form-input" type="text" placeholder="e.g. Dinner">
    </div>

    <div class="form-group">
        <label class="form-label">Total amount</label>
        <input class="form-input" type="number" placeholder="$0.00" inputmode="decimal">
    </div>

    <div class="form-group">
        <label class="form-label">Paid by</label>
        <select class="form-input">
            <option>You</option>
            <option>Alice</option>
            <option>Bob</option>
        </select>
    </div>

    <div class="form-group">
        <label class="form-label">Split</label>
        <select class="form-input">
            <option>Equally</option>
            <option>Exact amounts</option>
            <option>Percentages</option>
        </select>
    </div>

    <button class="btn-primary" type="submit">Save expense</button>
</form>
{% endblock %}
