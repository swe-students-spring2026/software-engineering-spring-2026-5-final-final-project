<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CineMatch{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <script>
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme === "dark") {
      document.body.classList.add("dark");
      document.body.classList.remove("light");
    } else if (savedTheme === "light") {
      document.body.classList.add("light");
      document.body.classList.remove("dark");
    }
  </script>

  <nav class="navbar">
    <a class="nav-brand" href="/">CineMatch</a>

    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/watchlist">Watchlist</a>
      <a href="/history">History</a>
      <a href="/analytics">Analytics</a>
    </div>

    <div class="nav-controls">
      {% if session.get("user_id") %}
        <div class="nav-user-group" aria-label="Signed in as {{ session.get('username') }}">
          <span class="nav-avatar" aria-hidden="true">{{ (session.get("username") or "?")[0]|upper }}</span>
          <span class="nav-user">{{ session.get("username") }}</span>
          <a href="/logout" class="btn-logout">Sign out</a>
        </div>
      {% else %}
        <a href="/login" class="btn-signin">Sign in</a>
      {% endif %}
      <button id="theme-toggle" class="theme-toggle" type="button"
              role="switch" aria-checked="false" aria-label="Toggle color theme">
        Dark Mode
      </button>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
