{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="auth-page">
    <h1 class="auth-title">SplitRing</h1>
    <p class="auth-subtitle">Split expenses with friends</p>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <p class="auth-error">{{ messages[0] }}</p>
    {% endif %}
    {% endwith %}

    <form class="auth-form" method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label class="form-label">Username</label>
            <input class="form-input" type="text" name="username" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" name="password" autocomplete="current-password" required>
        </div>
        <button class="btn-primary" type="submit">Log in</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Sign up</a></p>
</div>
{% endblock %}
