# pytest settings that might help... feel free to modify or remove as needed

[tool.pytest.ini_options]
minversion = "7.0" # minimum pytest version
addopts = "-ra -q -p no:cacheprovider" # default pytest command line options
pythonpath = [
  "web-app",
  "game-engine",
]
testpaths = [
    "web-app/tests",
    "game-engine/tests",
]
norecursedirs = [
    ".git",
    ".venv",
    "venv",
    ".pytest_cache",
    "pytest-cache-files-*",
]
