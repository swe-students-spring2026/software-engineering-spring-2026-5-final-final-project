# Local development stack. From the recommendation-service/ directory:
#
#     docker compose up --build         # build + run API and MongoDB
#     docker compose run --rm seed      # one-off: load sample data into the DB
#     docker compose down               # stop everything (keeps the data volume)
#     docker compose down -v            # stop and wipe the data volume
#
# After `up`, the API is on http://localhost:8000 and MongoDB on
# localhost:27017. Data persists in the named volume "rec_mongo_data".

services:
  recommendation:
    build: .
    image: library-recommendation-service:dev
    container_name: recommendation-api
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: library_app
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: recommendation-mongo
    ports:
      - "27017:27017"
    volumes:
      - rec_mongo_data:/data/db
    healthcheck:
      # `mongosh` ships in the mongo:7 image. The exit code of `db.runCommand`
      # is 0 only when the server responds to ping, so this is a true probe.
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # One-shot service: `docker compose run --rm seed` populates the DB with
  # sample rooms and historical checkins. It does not run by default — that's
  # what the `profiles` key does (it excludes the service from `up`).
  seed:
    build: .
    image: library-recommendation-service:dev
    profiles: ["tools"]
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: library_app
    depends_on:
      mongo:
        condition: service_healthy
    command: ["python", "scripts/seed_data.py"]

volumes:
  rec_mongo_data:
