<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyCast — Edit Exam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">

    <div class="page-header">
        <h1>StudyCast</h1>
        {% if session.user_name %}
            <span class="user-info">{{ session.user_name }} &nbsp;·&nbsp; <a href="/logout">Log out</a></span>
        {% endif %}
    </div>

    <div class="nav">
        <a href="/dashboard">Dashboard</a>
        <a href="/exams" class="active">Exams</a>
        <a href="/preparations">Preparations</a>
        <a href="/calendar">Calendar</a>
        <a href="/todos">To-Do</a>
    </div>

    <div class="card">
        <h2>Edit Exam</h2>
        <form action="/edit-exam/{{ exam._id }}" method="POST" class="form-group">

            <div class="form-grid">
                <div class="form-row">
                    <label>Subject / Course</label>
                    <input type="text" name="subject" value="{{ exam.subject }}" required>
                </div>
                <div class="form-row">
                    <label>Exam Date</label>
                    <input type="date" name="exam_date" value="{{ exam.exam_date }}" required>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-row">
                    <label>Exam Type</label>
                    <select name="exam_type">
                        {% for t in ["Quiz", "Midterm", "Final", "Project", "Homework"] %}
                            <option value="{{ t }}" {% if exam.exam_type == t %}selected{% endif %}>{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-row">
                    <label>Status</label>
                    <select name="status">
                        <option value="upcoming" {% if exam.status == "upcoming" %}selected{% endif %}>Upcoming</option>
                        <option value="done" {% if exam.status == "done" %}selected{% endif %}>Done</option>
                    </select>
                </div>
            </div>

            <div style="display:flex;gap:8px;margin-top:4px;">
                <button type="submit">Save Changes</button>
                <a href="/exams" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>

</div>
</body>
</html>
