<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeList — Playlist Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .chip { cursor:pointer; border-radius:9999px; padding:6px 16px; font-size:.8125rem; font-weight:500; transition:all .15s; border-width:1px; user-select:none; display:inline-block; }
    .chip-off { background:#2a2a2a; color:#ccc; border-color:#444; }
    .chip-off:hover { border-color:#1DB954; color:#fff; }
    .chip-on  { background:#1DB954; color:#000; border-color:#1DB954; }
    input[type=range] { accent-color:#1DB954; cursor:pointer; }
    #page-layout { display:flex; gap:28px; max-width:1060px; margin:0 auto; padding:40px 20px 100px; align-items:flex-start; }
    #rec-sidebar { width:260px; flex-shrink:0; position:sticky; top:64px; }
    @media (max-width:820px) {
      #page-layout { flex-direction:column-reverse; }
      #rec-sidebar { width:100%; position:static; }
    }
  </style>
</head>
<body style="background:#121212;color:#fff;min-height:100vh;font-family:system-ui,sans-serif;">

  <!-- Navbar -->
  <nav style="position:sticky;top:0;z-index:20;background:rgba(10,10,10,.92);backdrop-filter:blur(8px);border-bottom:1px solid #222;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;">
    <span style="color:#1DB954;font-weight:700;font-size:1.1rem;letter-spacing:-.5px;">VibeList</span>
    <div style="display:flex;align-items:center;gap:16px;font-size:.875rem;">
      {% if current_user %}
        <span style="color:#888;">{{ current_user.name }}</span>
        <a href="/logout" style="color:#888;text-decoration:none;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#888'">Sign out</a>
      {% else %}
        <a href="/login" style="color:#888;text-decoration:none;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#888'">Sign in</a>
      {% endif %}
    </div>
  </nav>

  <div id="page-layout">

    <!-- ── Generator (left) ── -->
    <main style="flex:1;min-width:0;">

      <h1 style="font-size:1.875rem;font-weight:700;margin-bottom:4px;">Create a Playlist</h1>
      <p style="color:#888;font-size:.875rem;margin-bottom:36px;">Add seed songs and tags, then generate a playlist.</p>

      <form id="generator-form" novalidate>

        <!-- Seed songs -->
        <div style="margin-bottom:32px;">
          <label style="font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#888;display:block;margin-bottom:10px;">Seed Songs</label>
          <div id="seed-chips" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;"></div>
          <div style="display:flex;gap:8px;">
            <input id="seed-input" type="text" placeholder="Artist or song name…"
                   style="flex:1;background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:10px 14px;font-size:.875rem;color:#fff;outline:none;transition:border-color .15s;"
                   onfocus="this.style.borderColor='#1DB954'" onblur="this.style.borderColor='#333'" />
            <button type="button" id="seed-add-btn"
                    style="background:#1e1e1e;border:1px solid #333;color:#fff;border-radius:8px;padding:10px 16px;font-size:.875rem;cursor:pointer;transition:border-color .15s;"
                    onmouseover="this.style.borderColor='#1DB954'" onmouseout="this.style.borderColor='#333'">
              Add
            </button>
          </div>
        </div>

        <!-- Genre -->
        <div style="margin-bottom:24px;">
          <label style="font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#888;display:block;margin-bottom:10px;">Genre</label>
          <div id="genre-chips" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
        </div>

        <!-- Mood -->
        <div style="margin-bottom:24px;">
          <label style="font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#888;display:block;margin-bottom:10px;">Mood</label>
          <div id="mood-chips" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
        </div>

        <!-- Era -->
        <div style="margin-bottom:24px;">
          <label style="font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#888;display:block;margin-bottom:10px;">Era</label>
          <div id="era-chips" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
        </div>

        <!-- Size -->
        <div style="margin-bottom:32px;">
          <label style="font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#888;display:block;margin-bottom:10px;">
            Playlist Size &mdash; <span id="size-display" style="color:#fff;">20</span> songs
          </label>
          <input id="size-slider" type="range" min="5" max="50" value="20" style="width:100%;height:4px;" />
          <div style="display:flex;justify-content:space-between;font-size:.75rem;color:#555;margin-top:4px;"><span>5</span><span>50</span></div>
        </div>

        <!-- Error -->
        <p id="error-msg" style="color:#f87171;font-size:.875rem;margin-bottom:12px;display:none;"></p>

        <!-- Generate -->
        <button id="generate-btn" type="submit"
                style="width:100%;background:#1DB954;color:#000;font-weight:700;border:none;border-radius:9999px;padding:14px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;"
                onmouseover="if(!this.disabled)this.style.background='#17a349'" onmouseout="if(!this.disabled)this.style.background='#1DB954'">
          <span id="btn-label">Generate Playlist</span>
          <svg id="btn-spinner" style="display:none;width:20px;height:20px;animation:spin 1s linear infinite;" fill="none" viewBox="0 0 24 24">
            <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity=".25"/>
            <path fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" opacity=".75"/>
          </svg>
        </button>

      </form>

      <!-- Results -->
      <section id="results" style="margin-top:48px;display:none;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;">
          <div>
            <h2 style="font-size:1.25rem;font-weight:700;margin:0 0 2px;">Your Playlist</h2>
            <p id="results-meta" style="color:#888;font-size:.8rem;margin:0;"></p>
          </div>
          <div style="display:flex;gap:8px;flex-shrink:0;margin-left:12px;">
            <button id="save-btn"
                    style="background:#1DB954;color:#000;font-weight:600;border:none;border-radius:9999px;padding:8px 18px;font-size:.875rem;cursor:pointer;transition:background .15s;"
                    onmouseover="this.style.background='#17a349'" onmouseout="this.style.background='#1DB954'">
              Save
            </button>
            <button id="regen-btn"
                    style="background:#2a2a2a;color:#fff;border:1px solid #444;border-radius:9999px;padding:8px 18px;font-size:.875rem;cursor:pointer;transition:background .15s;"
                    onmouseover="this.style.background='#333'" onmouseout="this.style.background='#2a2a2a'">
              Regenerate
            </button>
          </div>
        </div>
        <ol id="track-list" style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:4px;"></ol>
      </section>

    </main>

    <!-- ── Recommendations sidebar (right) ── -->
    <aside id="rec-sidebar">
      <div style="background:#1e1e1e;border:1px solid #2a2a2a;border-radius:12px;padding:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;">
          <h2 style="font-size:.95rem;font-weight:700;margin:0;">For You</h2>
          <button id="rec-refresh-btn"
                  title="Refresh recommendations"
                  style="background:none;border:none;color:#666;cursor:pointer;font-size:1rem;padding:2px 4px;transition:color .15s;"
                  onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#666'">↻</button>
        </div>
        <p id="rec-subtitle" style="color:#666;font-size:.75rem;margin:0 0 14px;">Based on your likes &amp; saves</p>
        <div id="rec-list">
          <p style="color:#555;font-size:.8rem;text-align:center;padding:16px 0;">Loading…</p>
        </div>
      </div>
    </aside>

  </div><!-- /page-layout -->

  <!-- Toast -->
  <div id="toast" style="position:fixed;bottom:24px;right:24px;background:#1e1e1e;border:1px solid #333;color:#fff;font-size:.875rem;border-radius:12px;padding:12px 20px;box-shadow:0 8px 32px rgba(0,0,0,.6);transform:translateY(16px);opacity:0;transition:all .3s;pointer-events:none;z-index:50;max-width:320px;"></div>

  <script>
    window.CURRENT_USER = {{ current_user | tojson }};
  </script>
  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
