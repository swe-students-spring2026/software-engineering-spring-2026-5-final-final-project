{% extends "base.html" %}

{% block content %}
	  <section>
	    {% if professor_id %}
	      <a class="back-link" href="{{ url_for('professor_page', professor_id=professor_id) }}{% if post_id %}#post-{{ post_id }}{% endif %}">← Back</a>
	    {% endif %}
	    <h1>{% if mode == "edit" %}Edit Post{% else %}Create Post{% endif %}</h1>
	    <p>About: <strong>{{ professor_name }}</strong></p>

    <form method="post" action="{{ form_action }}">
      <label for="text">Post</label>
      <textarea id="text" name="text" rows="8" placeholder="Write your post..." required>{{ post_text }}</textarea>
      <button type="submit">
        {% if mode == "edit" %}Save Changes{% else %}Publish{% endif %}
      </button>
    </form>
  </section>
{% endblock %}
