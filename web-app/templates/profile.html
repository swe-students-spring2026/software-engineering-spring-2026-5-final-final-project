{% extends "base.html" %}

{% block title %}Profile | Question Match{% endblock %}

{% block content %}
<section class="content-header">
  <h1>Your profile</h1>
  <p class="muted">Update the information shown after someone matches with you.</p>
</section>

{% if saved %}
  <section class="notice success">Profile changes saved.</section>
{% endif %}

<form method="post" class="form wide-form">
  <div class="grid two">
    <label>
      Username
      <input name="username" value="{{ user.username }}" required>
    </label>
    <label>
      Email
      <input name="email" type="email" value="{{ user.email }}" required>
    </label>
    <label>
      Age
      <input name="age" type="number" min="18" value="{{ user.age }}" required>
    </label>
    <label>
      Gender
      <input name="gender" value="{{ user.gender }}" required>
    </label>
    <label>
      Profile picture URL
      <input name="profile_pic" type="url" value="{{ user.profile_pic }}">
    </label>
  </div>

  <div class="question-list">
    {% for item in user.questions %}
      <label>
        {{ item.question }}
        <input name="answer_{{ loop.index }}" maxlength="10" value="{{ item.answer }}" required>
      </label>
    {% endfor %}
  </div>

  <button class="button primary" type="submit">Save changes</button>
</form>
{% endblock %}
