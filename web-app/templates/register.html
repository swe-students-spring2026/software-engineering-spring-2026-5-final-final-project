<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | PriorityManager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <main class="page center">
        <section class="card narrow">
            <p class="eyebrow">PriorityManager</p>
            <h1>Create account</h1>
            <p class="muted">Start organizing your assignments by priority.</p>

            <form method="POST" class="form">

                <div class="field">
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" placeholder="Choose a username" required>
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" placeholder="Create a password" required>
                </div>

                <button type="submit">Register</button>
            </form>

            <div class="divider">
                <span>or</span>
            </div>

            <p class="muted">
                Already have an account?
                <a href="{{ url_for('login') }}">Login</a>
            </p>
        </section>
    </main>
</body>
</html>
