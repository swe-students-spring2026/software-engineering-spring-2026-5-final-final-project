<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Campus Gigs{% endblock %}</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #0b0f19; color: #e8eefc; }
      a { color: #9cc2ff; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
      .nav { display: flex; gap: 16px; padding: 16px 24px; border-bottom: 1px solid #1c2540; background: #0b0f19; position: sticky; top: 0; }
      .card { background: #0f172a; border: 1px solid #1c2540; border-radius: 12px; padding: 16px; }
      .grid { display: grid; gap: 16px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
      .muted { color: #a8b3cf; font-size: 14px; }
      .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; border: 1px solid #2a365c; background: #0b1226; font-size: 12px; color: #cdd7f2; }
      .btn { display: inline-block; padding: 8px 12px; border-radius: 10px; border: 1px solid #2a365c; background: #111b34; color: #e8eefc; cursor: pointer; }
      .btn:hover { background: #16214a; }
      .btn-danger { border-color: #5c2a2a; background: #2a1111; }
      .btn-danger:hover { background: #3a1414; }
      input[type="text"] { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #2a365c; background: #0b1226; color: #e8eefc; }
      label { display: block; margin-bottom: 6px; }
      .flash { padding: 10px 12px; border-radius: 10px; border: 1px solid #2a365c; background: #0b1226; }
    </style>
  </head>
  <body>
    <nav class="nav">
      <a href="/my/gigs">My posted jobs</a>
      <a href="/me">Profile</a>
      <span class="muted">P3 screens</span>
    </nav>
    <main class="wrap">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="grid" style="margin-bottom: 16px;">
            {% for category, message in messages %}
              <div class="flash"><strong>{{ category }}</strong> — {{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
