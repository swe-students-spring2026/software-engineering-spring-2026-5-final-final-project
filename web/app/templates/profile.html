{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
  <div class="row" style="margin-bottom: 12px;">
    <h1 style="margin: 0;">Your profile</h1>
    <span class="muted">Update your tags for job matching</span>
  </div>

  <div class="card">
    <form method="post" class="grid">
      <div>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" value="{{ user.name or '' }}" />
      </div>
      <div>
        <label>Email</label>
        <div class="muted">{{ user.email or "unknown" }}</div>
      </div>
      <div>
        <label for="tags">Tags (comma-separated)</label>
        <input id="tags" name="tags" type="text" value="{{ (user.tags or [])|join(', ') }}" />
        <div class="muted" style="margin-top: 6px;">Examples: tutoring, moving, dog-walking, orgo</div>
      </div>
      <div class="row">
        <button class="btn" type="submit">Save</button>
      </div>
    </form>
  </div>
{% endblock %}
