<!doctype html>
<html>
  <head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>

  <body>
    <main class="container auth-container">
      <h1>Create Account</h1>
      <p class="subtitle">Sign up to start managing your reminders.</p>

      <form class="reminder-form" method="POST">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" placeholder="Choose a username" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Create a password" required>
        </div>

        <div class="form-actions">
          <button type="submit">Register</button>
          <a class="link" href="{{ url_for('auth.login') }}">Already have an account?</a>
        </div>
      </form>
    </main>
  </body>
</html>
