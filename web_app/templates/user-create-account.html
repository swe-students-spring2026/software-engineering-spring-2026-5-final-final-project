<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Afacad:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <title>Create Account</title>
</head>

<body>
    <section class="body">
        <section class="header">
            <span class="logo">
                <img src="{{ url_for('static', filename='icons/fm copy.svg') }}" alt="fm">
            </span>
            <h1>FlakeMate</h1>
        </section>

        <h2 class="auth-title">create account</h2>

        {% if error %}
        <p class="auth-error">{{ error }}</p>
        {% endif %}

        <form class="auth-form" method="POST" action="{{ url_for('create_account') }}">
            <input class="auth-input" type="text" name="name" placeholder="username" required>
            <input class="auth-input" type="text" name="phone_number" placeholder="phone #" required>
            <input class="auth-input" type="password" name="password" placeholder="password" required>
    
            <button class="auth-button" type="submit">create account</button>
        </form>

        <a class="auth-switch" href="{{ url_for('sign_in') }}">
            back to sign in
        </a>
    </section>
</body>
</html>
