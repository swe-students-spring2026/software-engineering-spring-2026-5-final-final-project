{% extends "base.html" %}
{% block title %}Create Event — DinnerMeet{% endblock %}

{% block content %}
<div class="form-container centered">
    <h1>Create Event</h1>

    {% if error %}
        <div class="flash error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/events/create">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required />

        <label for="datetime">Date & Time:</label>
        <input type="datetime-local" id="datetime" name="datetime" required />
        <p id="datetime-display" style="font-size: 0.9rem; color: #555; margin-top: 0.4rem;"></p>

        <script>
            const input = document.getElementById("datetime");
            const display = document.getElementById("datetime-display");

            const now = new Date();
            now.setSeconds(0, 0);
            const offset = now.getTimezoneOffset() * 60000;
            const localNow = new Date(now - offset).toISOString().slice(0, 16);
            input.min = localNow;

            input.addEventListener("change", function () {
                if (input.value) {
                    const date = new Date(input.value);
                    display.textContent = date.toLocaleString("en-US", {
                        month: "long",
                        day: "numeric",
                        year: "numeric",
                        hour: "numeric",
                        minute: "2-digit",
                    });
                }
            });
        </script>

        <label for="capacity">Hosting Capacity:</label>
        <input type="number" id="capacity" name="capacity" min="2" placeholder="Max guests (min 2)" required />

        <label for="description">Short Description:</label>
        <input type="text" id="description" name="description" />

        <button type="submit">Create Event</button>
    </form>
</div>
{% endblock %}
