<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Five</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Display:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-logo">Temp</div>
        <div class="nav-links">
            <a href="">Home</a>
            <a href="">About</a>
        </div>
    </nav>

    <main class="input" id="drop-zone">
        <h2> Clip your Video (Placeholder Title) </h2>
        <form id="upload-form" enctype="multipart/form-data">
            <input type="file" id="file-input" name="file" hidden>
            <button type="button" id="upload" onclick="document.getElementById('file-input').click()">
                Choose Video
            </button>
            <p>or drag and drop a file here</p>
        </form>
    </main>

    <script>
        const dropZone = document.getElementById("drop-zone");
        const fileInput = document.getElementById("file-input");
        const fileName = document.getElementById("file-name");

        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.classList.add("dragover");
        });

        dropZone.addEventListener("dragleave", () => {
            dropZone.classList.remove("dragover");
        });

        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.classList.remove("dragover");
            const file = e.dataTransfer.files[0];
            if (file) {
                fileInput.files = e.dataTransfer.files;
                fileName.textContent = file.name;
            }
        });

        fileInput.addEventListener("change", () => {
            fileName.textContent = fileInput.files[0] ? fileInput.files[0].name : "No file chosen";
        });
    </script>

</body>
</html>
